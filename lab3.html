<!DOCTYPE html>
<html>
<head>
	<! This style sheet is taken from  https://www.w3schools.com/howto/howto_js_tabs.asp>
	<link href="seg3125lab\lab3js\styles.css" rel="stylesheet" type="text/css">
    
</head>

<body onload= "populateListProductChoices('NutFree', 'LactoseFree','organicSelect', 'displayProduct')">

<!-- Tab links, each one with an onclick event associated with it -->
<div class = "maincontent">
  <h1>SEG-O-Mart</h1>

  <!-- Tab content -->
  <div id="Client" class="tabcontent">
    <h2>Preferences & Restrictions</h2>

    <u>Select Your Preferences:</u>
    <br>
    <div class="restrictionList">
      <input class="checkboxbtn" type="checkbox" id="organicSelect" name="organicSelect" value="organicSelect"
      onchange="populateListProductChoices('NutFree', 'LactoseFree','organicSelect', 'displayProduct')"> Organic
    </div>
    <br><br>

    <u>Choose Restrictions:</u>
    <br>
    <div class="restrictionList">
      <input class="checkboxbtn" type="checkbox" id="NutFree" name="NutFree" value="NutFree"
      onchange="populateListProductChoices('NutFree', 'LactoseFree','organicSelect', 'displayProduct')"> Nut Free
      <br>
      <input class="checkboxbtn" type="checkbox" id="LactoseFree" name="LactoseFree" value="LactoseFree"
      onchange="populateListProductChoices('NutFree', 'LactoseFree','organicSelect', 'displayProduct')"> Lactose Free
    </div>
    <br>
    <button class="nextbtn" onclick="openInfo(event, 'Products')">Next</button>
  </div>

  <div id="Products" class="tabcontent">
    <h2>Add Products to Cart</h2>
    <div class= "productList" id="displayProduct"></div>
    <br>
    
    <button class="backbtn" id="defaultOpen" onclick="openInfo(event, 'Client')">Back</button>
    <button class="nextbtn" onclick="openInfo(event, 'Cart'), selectedItems()">Next</button>
  </div>

  <div id="Cart" class="tabcontent">
    <h2>Your Cart</h2>
    <div class= "displayCart" id="displayCart"></div>
    <button class="backbtn" onclick="openInfo(event, 'Products')">Back</button>
    <div class="totalPrice" id="totalPrice"></div>
  </div>
</div>

<script src="seg3125lab\lab3js\groceries.js"></script>
<script src="seg3125lab\lab3js\main.js"></script>
<script>document.getElementById("defaultOpen").click();</script>

</body>
    <footer>
        <p>Website designed by: Chetan<br>
    </footer>
</html>
